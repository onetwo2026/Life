<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeForge OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; -webkit-font-smoothing: antialiased; overflow: hidden; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICON SYSTEM ---
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const paths = {
                target: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zm0-2a8 8 0 100-16 8 8 0 000 16zm0-4a4 4 0 110-8 4 4 0 010 8z",
                coins: "M17 21v-2a2 2 0 012-2h2M9 21v-2a2 2 0 00-2-2H5m4-14V3a2 2 0 114 0v2m0 14v2a2 2 0 11-4 0v-2m4-14h-4m12 10v-4a2 2 0 00-2-2h-2m-8 0H5a2 2 0 00-2 2v4",
                chevronLeft: "M15 18l-6-6 6-6",
                chevronRight: "M9 18l6-6-6-6",
                plus: "M12 5v14M5 12h14",
                flame: "M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1-2-.2-4 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.1.4-2.3 1-3a2.5 2.5 0 002.5 2.5z",
                trash: "M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2",
                check: "M20 6L9 17l-5-5",
                activity: "M22 12h-4l-3 9L9 3l-3 9H2",
                calendar: "M19 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm-3-2v4M8 2v4m-5 4h18",
                trophy: "M6 9H4.5a2.5 2.5 0 010-5H6m12 5h1.5a2.5 2.5 0 000-5H18m-2 22H8m4-4V7m-4 8a4 4 0 008 0V7H8v8z",
                palette: "M12 2c5.523 0 10 4.477 10 10S17.523 22 12 22 2 17.523 2 12 6.477 2 12 2zm0 2a8 8 0 100 16 8 8 0 000-16z M8 11a1 1 0 100-2 1 1 0 000 2z M12 8a1 1 0 100-2 1 1 0 000 2z M16 11a1 1 0 100-2 1 1 0 000 2z",
                edit: "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 113 3L12 15l-4 1 1-4 9.5-9.5z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name]} />
                </svg>
            );
        };

        // --- THEMES ---
        const HABIT_THEMES = [
            { id: 'obsidian', name: 'Obsidian', level: 1, colors: { bg: 'bg-zinc-950', card: 'bg-zinc-900', text: 'text-zinc-100', textMuted: 'text-zinc-500', accent: 'text-blue-500', accentBg: 'bg-blue-600', border: 'border-zinc-800' } },
            { id: 'midnight', name: 'Midnight', level: 3, colors: { bg: 'bg-slate-950', card: 'bg-slate-900', text: 'text-slate-100', textMuted: 'text-slate-500', accent: 'text-indigo-400', accentBg: 'bg-indigo-600', border: 'border-slate-800' } },
            { id: 'neon', name: 'Neon City', level: 5, colors: { bg: 'bg-black', card: 'bg-zinc-900', text: 'text-pink-50', textMuted: 'text-pink-900', accent: 'text-pink-500', accentBg: 'bg-pink-600', border: 'border-pink-900/30' } }
        ];

        // --- APP ENGINE ---
        function App() {
            const [view, setView] = useState('hub');
            const [habits, setHabits] = useState(() => JSON.parse(localStorage.getItem('LF_HABITS') || '{"tasks":[], "logs":{}, "xp":0, "theme":"obsidian"}'));
            const [coins, setCoins] = useState(() => JSON.parse(localStorage.getItem('LF_COINS') || '{"txs":[], "xp":0}'));

            useEffect(() => localStorage.setItem('LF_HABITS', JSON.stringify(habits)), [habits]);
            useEffect(() => localStorage.setItem('LF_COINS', JSON.stringify(coins)), [coins]);

            // --- HABITFORGE SUB-APP ---
            const HabitForge = () => {
                const [activeDate, setActiveDate] = useState(new Date().toISOString().split('T')[0]);
                const [tab, setTab] = useState('home');
                const [showAdd, setShowAdd] = useState(false);
                const theme = HABIT_THEMES.find(t => t.id === habits.theme) || HABIT_THEMES[0];
                
                const level = Math.floor(habits.xp / 150) + 1;
                const progress = ((habits.xp % 150) / 150) * 100;

                const toggleHabit = (id) => {
                    const logs = habits.logs[activeDate] || {};
                    const isDone = !!logs[id];
                    setHabits({
                        ...habits,
                        logs: { ...habits.logs, [activeDate]: { ...logs, [id]: !isDone } },
                        xp: habits.xp + (isDone ? -50 : 50)
                    });
                };

                return (
                    <div className={`min-h-screen ${theme.colors.bg} ${theme.colors.text} flex flex-col animate-in overflow-hidden`}>
                        {/* Header */}
                        <header className={`p-6 pb-4 ${theme.colors.card} border-b ${theme.colors.border} rounded-b-3xl shadow-xl`}>
                            <div className="flex justify-between items-center mb-4">
                                <button onClick={() => setView('hub')}><Icon name="chevronLeft" className={theme.colors.textMuted} /></button>
                                <div className={`flex items-center gap-1 font-black ${theme.colors.accent}`}><Icon name="flame" size={18} fill="currentColor" /> {habits.xp} XP</div>
                            </div>
                            <div className="flex justify-between items-center mb-4">
                                <button onClick={() => {let d = new Date(activeDate); d.setDate(d.getDate()-1); setActiveDate(d.toISOString().split('T')[0])}}><Icon name="chevronLeft" size={18} /></button>
                                <h2 className="font-bold text-lg tracking-tight">{activeDate === new Date().toISOString().split('T')[0] ? "Today" : activeDate}</h2>
                                <button onClick={() => {let d = new Date(activeDate); d.setDate(d.getDate()+1); setActiveDate(d.toISOString().split('T')[0])}}><Icon name="chevronRight" size={18} /></button>
                            </div>
                            <div className="h-1.5 w-full bg-black/40 rounded-full overflow-hidden">
                                <div className={`h-full ${theme.colors.accentBg} transition-all duration-500`} style={{width: `${progress}%`}} />
                            </div>
                            <div className={`text-[10px] font-black uppercase mt-1 tracking-widest ${theme.colors.textMuted}`}>Level {level} Achiever</div>
                        </header>

                        {/* Content */}
                        <main className="flex-1 p-6 overflow-y-auto no-scrollbar pb-32">
                            {tab === 'home' && (
                                <div className="space-y-4">
                                    {habits.tasks.length === 0 && <div className="text-center py-20 opacity-20 font-bold uppercase tracking-widest">No Quests Active</div>}
                                    {habits.tasks.map(t => (
                                        <div key={t.id} onClick={() => toggleHabit(t.id)} className={`p-5 rounded-2xl border transition-all flex justify-between items-center ${habits.logs[activeDate]?.[t.id] ? `${theme.colors.accentBg} border-transparent shadow-lg scale-[0.98] opacity-60` : `${theme.colors.card} ${theme.colors.border}`}`}>
                                            <span className="font-bold text-lg">{t.name}</span>
                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${habits.logs[activeDate]?.[t.id] ? 'bg-white/20' : 'bg-black/20'}`}>
                                                {habits.logs[activeDate]?.[t.id] ? <Icon name="check" size={20} /> : null}
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setShowAdd(true)} className={`w-full p-5 rounded-2xl border-2 border-dashed ${theme.colors.border} ${theme.colors.textMuted} font-black flex items-center justify-center gap-2`}>
                                        <Icon name="plus" size={20} /> ADD NEW QUEST
                                    </button>
                                </div>
                            )}

                            {tab === 'rewards' && (
                                <div className="space-y-4">
                                    <h3 className="font-black italic text-xl mb-4">UNLOCKABLES</h3>
                                    {HABIT_THEMES.map(t => (
                                        <div key={t.id} onClick={() => level >= t.level && setHabits({...habits, theme: t.id})} className={`p-5 rounded-2xl border flex justify-between items-center ${level < t.level ? 'opacity-30' : (habits.theme === t.id ? 'border-blue-500 bg-blue-500/10' : 'border-zinc-800')}`}>
                                            <div className="flex items-center gap-3">
                                                <div className={`w-4 h-4 rounded-full ${t.colors.accentBg}`} />
                                                <span className="font-bold">{t.name}</span>
                                            </div>
                                            <span className="text-xs font-black uppercase tracking-widest">{level >= t.level ? (habits.theme === t.id ? 'Equipped' : 'Unlocked') : `Lvl ${t.level}`}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>

                        {/* Nav */}
                        <nav className={`fixed bottom-0 left-0 right-0 p-6 pt-4 ${theme.colors.card} border-t ${theme.colors.border} flex justify-around safe-pb shadow-2xl rounded-t-3xl`}>
                            <button onClick={() => setTab('home')} className={tab === 'home' ? theme.colors.accent : 'opacity-30'}><Icon name="calendar" /></button>
                            <button onClick={() => setTab('stats')} className={tab === 'stats' ? theme.colors.accent : 'opacity-30'}><Icon name="activity" /></button>
                            <button onClick={() => setTab('rewards')} className={tab === 'rewards' ? theme.colors.accent : 'opacity-30'}><Icon name="palette" /></button>
                        </nav>

                        {/* Modal */}
                        {showAdd && (
                            <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-8 z-50">
                                <div className="bg-zinc-900 w-full p-8 rounded-3xl border border-zinc-800">
                                    <h2 className="text-xl font-black italic mb-6">NEW QUEST</h2>
                                    <input id="h-in" autoFocus className="w-full bg-black border border-zinc-800 p-4 rounded-xl mb-6 focus:outline-none focus:border-blue-600 font-bold" placeholder="Task Name..." />
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowAdd(false)} className="flex-1 font-bold text-zinc-500">CANCEL</button>
                                        <button onClick={() => {
                                            const name = document.getElementById('h-in').value;
                                            if(name) setHabits({...habits, tasks: [...habits.tasks, {id: Date.now(), name}]});
                                            setShowAdd(false);
                                        }} className="flex-1 bg-blue-600 py-3 rounded-xl font-black">FORGE</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- COINQUEST SUB-APP ---
            const CoinQuest = () => {
                const [showLog, setShowLog] = useState(false);
                const balance = coins.txs.reduce((s, t) => t.type === 'in' ? s + t.amt : s - t.amt, 0);

                return (
                    <div className="min-h-screen bg-black text-white flex flex-col animate-in overflow-hidden">
                        <header className="p-8 pb-10 bg-zinc-900 rounded-b-[40px] border-b border-zinc-800 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-500/10 blur-[80px]" />
                            <button onClick={() => setView('hub')} className="text-zinc-500 mb-6"><Icon name="chevronLeft" /></button>
                            <div className="text-center relative z-10">
                                <span className="text-[10px] font-black uppercase tracking-[0.4em] text-zinc-500 mb-2 block">Net Treasury</span>
                                <h2 className={`text-6xl font-black tracking-tighter ${balance >= 0 ? 'text-yellow-500' : 'text-red-500'}`}>${balance.toFixed(2)}</h2>
                            </div>
                        </header>

                        <main className="flex-1 p-6 space-y-6 overflow-y-auto no-scrollbar pb-40">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-emerald-500/10 border border-emerald-500/20 p-5 rounded-3xl">
                                    <span className="text-[10px] font-black text-emerald-500 uppercase block mb-1">Loot</span>
                                    <span className="text-2xl font-black text-emerald-400">+${coins.txs.filter(t=>t.type==='in').reduce((s,t)=>s+t.amt,0).toFixed(0)}</span>
                                </div>
                                <div className="bg-red-500/10 border border-red-500/20 p-5 rounded-3xl">
                                    <span className="text-[10px] font-black text-red-500 uppercase block mb-1">Damage</span>
                                    <span className="text-2xl font-black text-red-400">-${coins.txs.filter(t=>t.type==='out').reduce((s,t)=>s+t.amt,0).toFixed(0)}</span>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <h3 className="font-black uppercase text-[10px] tracking-widest text-zinc-600 mb-4">Ledger History</h3>
                                {coins.txs.map(t => (
                                    <div key={t.id} className="p-4 bg-zinc-950 border border-zinc-900 rounded-2xl flex justify-between items-center">
                                        <div>
                                            <div className="font-bold text-zinc-100">{t.desc || 'Unknown Encounter'}</div>
                                            <div className="text-[10px] font-black text-zinc-600 uppercase mt-1">{new Date(t.id).toLocaleDateString()}</div>
                                        </div>
                                        <div className={`font-black ${t.type === 'in' ? 'text-emerald-500' : 'text-red-500'}`}>
                                            {t.type === 'in' ? '+' : '-'}${t.amt.toFixed(2)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>

                        <button onClick={() => setShowLog(true)} className="fixed bottom-10 left-8 right-8 py-5 bg-yellow-500 rounded-3xl text-black font-black text-xl shadow-[0_20px_40px_rgba(234,179,8,0.3)] active:scale-95 transition-all">
                            LOG ACTIVITY
                        </button>

                        {showLog && (
                            <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-8 z-50">
                                <div className="bg-zinc-900 w-full p-8 rounded-[40px] border border-zinc-800">
                                    <div className="flex bg-black p-1 rounded-2xl mb-6">
                                        <button id="cin" onClick={() => {document.getElementById('cin').className="flex-1 py-3 bg-emerald-600 rounded-xl font-bold"; document.getElementById('cout').className="flex-1 py-3 text-zinc-600 font-bold"}} className="flex-1 py-3 bg-emerald-600 rounded-xl font-bold">LOOT</button>
                                        <button id="cout" onClick={() => {document.getElementById('cout').className="flex-1 py-3 bg-red-600 rounded-xl font-bold"; document.getElementById('cin').className="flex-1 py-3 text-zinc-600 font-bold"}} className="flex-1 py-3 text-zinc-600 font-bold">DAMAGE</button>
                                    </div>
                                    <input id="camt" type="number" placeholder="0.00" className="w-full bg-black border border-zinc-800 p-6 rounded-2xl mb-4 text-4xl font-black text-center focus:outline-none focus:border-yellow-500" />
                                    <input id="cdesc" placeholder="Source..." className="w-full bg-black border border-zinc-800 p-4 rounded-xl mb-8 font-bold text-zinc-400" />
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowLog(false)} className="flex-1 font-bold text-zinc-600">CANCEL</button>
                                        <button onClick={() => {
                                            const amt = Number(document.getElementById('camt').value);
                                            const desc = document.getElementById('cdesc').value;
                                            const type = document.getElementById('cin').className.includes('emerald') ? 'in' : 'out';
                                            if(amt) setCoins({...coins, txs: [{id: Date.now(), amt, desc, type}, ...coins.txs]});
                                            setShowLog(false);
                                        }} className="flex-1 bg-white text-black py-4 rounded-2xl font-black">RECORD</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- HUB VIEW ---
            if (view === 'habits') return <HabitForge />;
            if (view === 'coins') return <CoinQuest />;

            return (
                <div className="min-h-screen bg-black p-8 flex flex-col safe-pb animate-in">
                    <header className="py-12">
                        <h1 className="text-5xl font-black italic tracking-tighter leading-none mb-2 underline decoration-blue-600 decoration-8 underline-offset-8">LIFEFORGE</h1>
                        <p className="text-zinc-700 font-bold uppercase text-[10px] tracking-[0.5em]">System Version 2.2 // Standalone</p>
                    </header>

                    <div className="space-y-6">
                        <button onClick={() => setView('habits')} className="w-full glass p-8 rounded-[40px] flex items-center justify-between active:scale-95 transition-all">
                            <div className="flex items-center gap-6">
                                <div className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.4)]"><Icon name="target" size={32} /></div>
                                <div className="text-left">
                                    <h2 className="text-2xl font-black italic">HABITFORGE</h2>
                                    <p className="text-zinc-500 font-bold text-xs uppercase tracking-widest">Level {Math.floor(habits.xp/150)+1} Achiever</p>
                                </div>
                            </div>
                            <Icon name="chevronRight" className="text-zinc-800" />
                        </button>

                        <button onClick={() => setView('coins')} className="w-full glass p-8 rounded-[40px] flex items-center justify-between active:scale-95 transition-all">
                            <div className="flex items-center gap-6">
                                <div className="w-16 h-16 bg-yellow-500 rounded-3xl flex items-center justify-center shadow-[0_0_30px_rgba(234,179,8,0.4)] text-black"><Icon name="coins" size={32} /></div>
                                <div className="text-left">
                                    <h2 className="text-2xl font-black italic">COINQUEST</h2>
                                    <p className="text-zinc-500 font-bold text-xs uppercase tracking-widest">Treasury Active</p>
                                </div>
                            </div>
                            <Icon name="chevronRight" className="text-zinc-800" />
                        </button>

                        <div className="w-full glass p-8 rounded-[40px] flex items-center justify-between opacity-30 cursor-not-allowed">
                            <div className="flex items-center gap-6">
                                <div className="w-16 h-16 bg-zinc-800 rounded-3xl flex items-center justify-center text-zinc-500"><Icon name="activity" size={32} /></div>
                                <div className="text-left">
                                    <h2 className="text-2xl font-black italic">IRON ARCHIVE</h2>
                                    <p className="text-zinc-500 font-bold text-xs uppercase tracking-widest">Locked Module</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="mt-auto pt-10 flex flex-col gap-4">
                        <div className="flex gap-2">
                            <button onClick={() => {
                                const data = btoa(JSON.stringify({h:habits, c:coins}));
                                prompt("BACKUP CODE (Copy this):", data);
                            }} className="flex-1 py-3 bg-zinc-900 rounded-xl text-[10px] font-black uppercase tracking-widest text-zinc-600">Backup</button>
                            <button onClick={() => {
                                const code = prompt("Paste Backup Code:");
                                if(code) {
                                    const d = JSON.parse(atob(code));
                                    setHabits(d.h); setCoins(d.c);
                                    alert("Forge Restored.");
                                }
                            }} className="flex-1 py-3 bg-zinc-900 rounded-xl text-[10px] font-black uppercase tracking-widest text-zinc-600">Restore</button>
                        </div>
                        <p className="text-[10px] font-black text-center text-zinc-900 uppercase tracking-widest">Designed for Jesse // Air Bows Operations</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
